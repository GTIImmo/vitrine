<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Samsung Basic</title>
  <style>
    html,body{margin:0;padding:0;background:#f4f5f7;color:#111;font-family:Arial,sans-serif}
    .wrap{padding:16px}
    .box{background:#fff;border:1px solid #ddd;padding:16px;margin-bottom:16px}
    .title{font-size:28px;font-weight:bold;margin:0 0 8px}
    .muted{color:#666}
    .hero{width:100%;max-width:100%;height:auto;display:block;background:#eee}
    .price{font-size:28px;font-weight:bold;color:#c2185b;margin:12px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="title">Samsung basic</div>
      <div id="status" class="muted">Chargement…</div>
    </div>
    <div class="box">
      <img id="hero" class="hero" alt="">
      <div id="price" class="price">—</div>
      <div id="title">—</div>
      <div id="meta" class="muted">—</div>
    </div>
  </div>
  <script>
    (function () {
      function q(name) {
        var s = window.location.search || "";
        var parts = s.replace(/^\?/, "").split("&");
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i].split("=");
          if (decodeURIComponent(p[0] || "") === name) return decodeURIComponent((p[1] || "").replace(/\+/g, " "));
        }
        return "";
      }
      function txt(v){ return v == null ? "" : String(v); }
      function xhrGet(url, done, fail){
        var x = new XMLHttpRequest();
        x.open("GET", url, true);
        x.onreadystatechange = function(){
          if (x.readyState !== 4) return;
          if (x.status >= 200 && x.status < 300) done(x.responseText);
          else fail("HTTP " + x.status);
        };
        x.onerror = function(){ fail("network"); };
        x.send();
      }
      var agence = q("agence");
      var src = q("src") || "exports/catalogue_vitrine.json";
      document.getElementById("status").innerHTML = "Chargement JSON : " + src;
      xhrGet(src, function(body){
        var data;
        try { data = JSON.parse(body); } catch(e) {
          document.getElementById("status").innerHTML = "JSON invalide";
          return;
        }
        var items = data && data.items ? data.items : [];
        if (agence) {
          var upper = agence.toUpperCase();
          var filtered = [];
          for (var i=0;i<items.length;i++){
            var a = txt(items[i].agence).toUpperCase();
            if (a.indexOf(upper) !== -1) filtered.push(items[i]);
          }
          items = filtered;
        }
        if (!items.length) {
          document.getElementById("status").innerHTML = "Aucune annonce";
          return;
        }
        var item = items[0];
        document.getElementById("status").innerHTML = "OK : " + items.length + " annonce(s)";
        document.getElementById("price").innerHTML = txt(item.price);
        document.getElementById("title").innerHTML = txt(item.title || item.nature || item.propertyType || "Sans titre");
        document.getElementById("meta").innerHTML = txt(item.city || "");
        if (item.photos && item.photos.length) document.getElementById("hero").src = item.photos[0];
      }, function(err){
        document.getElementById("status").innerHTML = "Erreur : " + err;
      });
    })();
  </script>
</body>
</html>
