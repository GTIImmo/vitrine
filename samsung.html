<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Samsung | Vitrine GTI</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f4f5f7; color: #121318; font-family: Arial, sans-serif; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border: 1px solid rgba(18,19,24,.08); border-radius: 16px; box-shadow: 0 12px 28px rgba(0,0,0,.06); padding: 18px; margin-bottom: 18px; }
    .title { font-size: 30px; font-weight: 800; margin: 0 0 8px; }
    .muted { color: rgba(18,19,24,.62); }
    .ok { color: #0f766e; font-weight: 700; }
    .bad { color: #b42318; font-weight: 700; }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; }
    .hero { width: 100%; height: 420px; background: #e9edf3; border-radius: 14px; object-fit: cover; display: block; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: rgba(18,19,24,.5); margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 700; }
    .list { margin: 0; padding-left: 18px; }
    .list li { margin: 6px 0; }
    .mono { font-family: Consolas, monospace; font-size: 13px; word-break: break-all; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hero { height: 280px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Samsung Vitrine</div>
      <div class="muted">Version simplifiée, dédiée à ce navigateur Samsung.</div>
    </div>

    <div class="card">
      <div class="label">Diagnostic</div>
      <div id="status" class="value">Chargement...</div>
      <div id="details" class="muted" style="margin-top:8px;"></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Première image</div>
        <img id="hero" class="hero" alt="Image test" />
        <div id="imageState" class="muted" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <div class="label">Première annonce retenue</div>
        <div id="itemTitle" class="value">—</div>
        <div id="itemMeta" class="muted" style="margin-top:8px;">—</div>
        <div style="margin-top:16px;">
          <div class="label">URL JSON</div>
          <div id="jsonUrl" class="mono">—</div>
        </div>
        <div style="margin-top:16px;">
          <div class="label">Agence demandée</div>
          <div id="agency" class="value">—</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="label">Exemples de titres chargés</div>
      <ol id="titles" class="list"></ol>
    </div>
  </div>

  <script>
    (function () {
      function text(v) { return (v == null ? "" : String(v)).replace(/^\s+|\s+$/g, ""); }
      function setHtml(id, value) { var el = document.getElementById(id); if (el) el.innerHTML = value; }
      function setText(id, value) { var el = document.getElementById(id); if (el) el.textContent = value; }
      function params() {
        var out = {};
        var q = window.location.search.replace(/^\?/, "").split("&");
        for (var i = 0; i < q.length; i++) {
          if (!q[i]) continue;
          var p = q[i].split("=");
          var k = decodeURIComponent(p[0] || "");
          var v = decodeURIComponent(p.slice(1).join("=") || "");
          out[k] = v;
        }
        return out;
      }
      function normalizeAgency(v) { return text(v).toUpperCase(); }
      function pickPhoto(item) {
        if (!item) return "";
        var arr = item.photos;
        if (arr && arr.length) return text(arr[0]);
        return "";
      }

      var p = params();
      var src = text(p.src || "exports/catalogue_vitrine.json");
      var agence = text(p.agence || "");
      setText("jsonUrl", new URL(src, window.location.href).toString());
      setText("agency", agence || "(aucune)");

      var xhr = new XMLHttpRequest();
      xhr.open("GET", new URL(src, window.location.href).toString(), true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;

        if (xhr.status < 200 || xhr.status >= 300) {
          setHtml("status", '<span class="bad">Erreur HTTP ' + xhr.status + "</span>");
          setText("details", "Le JSON n'a pas pu être chargé.");
          return;
        }

        var data;
        try {
          data = JSON.parse(xhr.responseText);
        } catch (e) {
          setHtml("status", '<span class="bad">JSON invalide</span>');
          setText("details", String(e));
          return;
        }

        var items = data && data.items && data.items.slice ? data.items.slice(0) : [];
        var total = items.length;
        if (agence) {
          var target = normalizeAgency(agence);
          items = items.filter(function (x) {
            return normalizeAgency(x && x.agence).indexOf(target) !== -1;
          });
        }

        if (!items.length) {
          setHtml("status", '<span class="bad">Aucune annonce retenue</span>');
          setText("details", "Le JSON est chargé, mais le filtre agence ne renvoie rien.");
          return;
        }

        setHtml("status", '<span class="ok">JSON chargé</span>');
        setText("details", "Items totaux : " + total + " | Items après filtre : " + items.length);

        var first = items[0];
        setText("itemTitle", text(first.title || first.nature || "Sans titre"));
        setText("itemMeta", [text(first.city), text(first.price), text(first.ref)].filter(Boolean).join(" • "));

        var img = pickPhoto(first);
        var hero = document.getElementById("hero");
        if (img) {
          hero.src = img;
          setHtml("imageState", '<span class="ok">Image définie</span> ' + img);
        } else {
          setHtml("imageState", '<span class="bad">Aucune image dans la donnée</span>');
        }

        var titles = document.getElementById("titles");
        for (var i = 0; i < Math.min(items.length, 8); i++) {
          var li = document.createElement("li");
          li.textContent = text(items[i].title || items[i].nature || items[i].ref || "Sans titre");
          titles.appendChild(li);
        }
      };
      xhr.onerror = function () {
        setHtml("status", '<span class="bad">Erreur réseau</span>');
        setText("details", "Le navigateur n'a pas pu charger le JSON.");
      };
      xhr.send();
    })();
  </script>
</body>
</html>
